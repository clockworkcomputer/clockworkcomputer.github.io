<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clockwork Computer | Redes y enlaces</title>

  <!-- 🔥 FAVICON -->
  <link rel="icon" type="image/png" href="https://blogger.googleusercontent.com/img/a/AVvXsEjuquj9lFaN9zfg8H5FofNIUKAHWWRiOUbDhHragpU14TfF6RYKxb5w62mfAClxDkDrzCMAilRatibcoWFbuqMnXMBh30p_sfbxp4D2gUny70NbjyHLrs42VXeBB4Qtc8NovIS_DqIU5iq3dMMx1TuNZkW70MeW8Ryemwk_tDv6iKZi9ngKfaskUG1yCWo=s1600">

  <meta name="description" content="Clockwork Computer - Blog y redes sociales." />

  <style>
    :root {
      --bg: #070707;
      --panel: #111111;
      --panel-2: #171717;
      --text: #f5f5f5;
      --muted: #b9b9b9;
      --accent: #ff6a00;
      --accent-2: #ff8c33;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 12px 40px rgba(0,0,0,0.42);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,106,0,0.14), transparent 24%),
        linear-gradient(180deg, #050505 0%, #0b0b0b 100%);
    }

    .wrap {
      width: min(1100px, 92%);
      margin: 0 auto;
      padding: 22px 0 34px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.95fr;
      gap: 18px;
    }

    .hero-card,
    .panel,
    .social-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: 24px;
    }

    .hero-top {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 24px;
    }

    .brand-text h1 {
      margin: 0 0 10px;
      font-size: 2.5rem;
    }

    .brand-text p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 14px;
      font-weight: bold;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      text-decoration: none;
      display: inline-block;
    }

    .panel {
      padding: 20px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .profile img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
    }

    .quick-links a {
      display: block;
      margin: 8px 0;
      padding: 12px;
      background: var(--panel-2);
      border-radius: 12px;
      text-decoration: none;
      color: white;
    }

    .section {
      margin-top: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .social-card {
      padding: 16px;
      border-radius: 16px;
    }

    .social-card.featured {
      border-color: rgba(255,106,0,0.3);
    }

    @media (max-width: 920px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 620px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

  </style>
</head>

<body>
  <main class="wrap">
    <section class="hero">

      <div class="hero-card">
        <div class="hero-top">
          <img class="logo" src="https://blogger.googleusercontent.com/img/a/AVvXsEjuquj9lFaN9zfg8H5FofNIUKAHWWRiOUbDhHragpU14TfF6RYKxb5w62mfAClxDkDrzCMAilRatibcoWFbuqMnXMBh30p_sfbxp4D2gUny70NbjyHLrs42VXeBB4Qtc8NovIS_DqIU5iq3dMMx1TuNZkW70MeW8Ryemwk_tDv6iKZi9ngKfaskUG1yCWo=s1600"/>

          <div class="brand-text">
            <h1>Bienvenido/a</h1>
            <p>
              Accede de forma rápida a mi blog, redes sociales y perfiles profesionales.
            </p>
          </div>
        </div>

        <a class="btn" href="https://clockworkcomputerip.blogspot.com/" target="_blank">
          Ir al blog
        </a>
      </div>

      <aside class="panel">
        <div class="profile">
          <img src="https://media.licdn.com/dms/image/v2/D4D03AQGiccsjG-GXyA/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1685535275184?e=1775692800&v=beta&t=DQxitd70IT5m23yhQWi8XkkW2WoTtzFCZqpSJavE6ho"/>
          <div>
            <h2>Daniel Stanislowsky</h2>
            <p>Ciberseguridad · Comunidad</p>
          </div>
        </div>

        <div class="quick-links">
          <a href="https://www.linkedin.com/in/danielstanislowsky/" target="_blank">LinkedIn personal</a>
          <a href="https://www.linkedin.com/company/clockworkcomputer" target="_blank">LinkedIn empresa</a>
          <a href="https://wazuh.com/ambassadors/daniel-stanislowsky/" target="_blank">Wazuh Ambassador</a>
        </div>
      </aside>

    </section>

    <section class="section">
      <h2>Mis enlaces</h2>

      <div class="grid">
        <a class="social-card featured" href="https://clockworkcomputerip.blogspot.com/" target="_blank">Blog</a>
        <a class="social-card" href="https://www.youtube.com/c/ClockworkComputerIP" target="_blank">YouTube</a>
        <a class="social-card" href="https://x.com/clockworkip" target="_blank">X / Twitter</a>
        <a class="social-card" href="https://www.patreon.com/ClockworkComputer" target="_blank">Patreon</a>
        <a class="social-card" href="https://github.com/clockworkcomputer" target="_blank">GitHub</a>
        <a class="social-card" href="https://www.linkedin.com/in/danielstanislowsky/" target="_blank">LinkedIn</a>
      </div>
    </section>

  </main>
</body>
</html>
