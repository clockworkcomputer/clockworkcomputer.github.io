<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clockwork Computer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      text-align: center;
      background: #1e293b;
      padding: 40px;
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2rem;
    }

    p {
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    .links a {
      display: block;
      margin: 12px 0;
      padding: 14px;
      text-decoration: none;
      color: white;
      background: #2563eb;
      border-radius: 10px;
      transition: 0.2s;
      font-weight: bold;
    }

    .links a:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Clockwork Computer</h1>
    <p>Blog, documentación y redes</p>

    <div class="links">
      <a href="https://clockworkcomputerip.blogspot.com/" target="_blank">Blog</a>
      <a href="https://clockworkcomputer.github.io/documentacion/" target="_blank">Documentación</a>
      <a href="https://youtube.com/" target="_blank">YouTube</a>
      <a href="https://github.com/clockworkcomputer" target="_blank">GitHub</a>
    </div>
  </div>
</body>
</html>
